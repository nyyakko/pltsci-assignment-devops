apiVersion: v1
kind: Pod
metadata:
  namespace: gok
  generateName: grok-
  labels:
    app: grok
spec:
  volumes:
    - name: grok-db
      emptyDir: {}
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - name: http
          containerPort: 80
      volumeMounts:
        - mountPath: /usr/share/nginx/html/grok
          name: grok-db
          readOnly: true
    - name: answer-generator
      image: busybox
      volumeMounts:
        - mountPath: /grok
          name: grok-db
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
      command:
        - sh
        - -c
        - |
          while :
          do
              STATE=$(((RANDOM % $((2 - 0))) + 0))

              if [[ $STATE -eq "1" ]]; then
                  echo "yes" > /grok/answer
              elif [[ $STATE -eq "0" ]]; then
                  echo "no" > /grok/answer
              fi

              echo "work done from: $POD_NAME" >> /grok/answer

              sleep 1
          done
