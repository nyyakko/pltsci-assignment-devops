apiVersion: v1
kind: Pod
metadata:
  name: echo-label
  namespace: labelled
  labels:
    app: demo
spec:
  restartPolicy: OnFailure
  containers:
    - name: echo
      image: busybox
      env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: APP_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['app']
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
      command:
        - sh
        - -c
        - |
          echo "[$NAMESPACE::$APP_NAME::$POD_NAME]: Hello, world!"
          sleep 9999
